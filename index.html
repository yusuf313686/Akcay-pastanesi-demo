<style>
:root{
  --primary:#2D2D2D; --secondary:#1A1A1A; --accent:#D4A843;
  --bg:#FFFDF7; --text:#1A1A1A;
  --font-head:'Montserrat',sans-serif;
  --font-body:'Mulish',sans-serif;
  --radius:14px;
  --shadow:0 6px 24px rgba(0,0,0,.09);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

/* ---------- Header ---------- */
header{
  background:var(--bg);
  border-bottom:2px solid var(--accent);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.brand{
  font-family:var(--font-head);
  font-size:1.35rem;font-weight:700;color:var(--primary);
}
.header-cta{
  background:var(--primary);color:#fff;
  padding:10px 18px;border-radius:999px;
  font-weight:700;font-size:.9rem;
  min-height:44px;display:inline-flex;align-items:center;
}

/* ---------- Hero ---------- */
.hero{
  text-align:center;
  padding:64px 24px 56px;
  background:linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--accent) 12%, var(--bg)) 100%);
}
.hero h1{
  font-family:var(--font-head);
  font-size:clamp(2rem, 6vw, 3.2rem);
  color:var(--primary);
  line-height:1.15;
  margin-bottom:14px;
}
.hero p{
  font-size:1.1rem;max-width:520px;margin:0 auto 28px;
  opacity:.85;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  min-height:48px;padding:12px 26px;
  border-radius:999px;font-weight:800;font-size:1rem;
  transition:transform .2s ease, box-shadow .2s ease;
}
.btn:active{transform:scale(.97)}
.btn-wa{background:#25D366;color:#fff;box-shadow:var(--shadow)}
.btn-form{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn-tel{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.hero .btn+.btn{margin-left:10px}

/* ---------- Sections ---------- */
section{padding:56px 20px;max-width:1100px;margin:0 auto}
.section-title{
  font-family:var(--font-head);
  font-size:clamp(1.6rem, 4vw, 2.2rem);
  color:var(--primary);text-align:center;margin-bottom:8px;
}
.section-sub{text-align:center;opacity:.7;margin-bottom:36px}

/* ---------- Ürünler ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:24px;
}
.card{
  background:#fff;border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  display:flex;flex-direction:column;
}
.card-img{
  aspect-ratio:1/1;
  object-fit:cover;object-position:center;
  background:color-mix(in srgb, var(--accent) 18%, #e9e2d6);
  width:100%;
}
.card-body{padding:18px 18px 20px;flex:1;display:flex;flex-direction:column;gap:8px}
.card-body h3{font-family:var(--font-head);font-size:1.2rem;color:var(--secondary)}
.card-body p{font-size:.92rem;opacity:.75;flex:1}
.card-wa{
  margin-top:6px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:48px;border-radius:10px;
  background:color-mix(in srgb, var(--accent) 22%, #fff);
  color:var(--secondary);font-weight:800;font-size:.9rem;
  border:1.5px solid var(--accent);
  transition:background .2s;
}
.card-wa:hover{background:var(--accent);color:#fff}

/* ---------- Dijital Menü ---------- */
.menu-wrap{max-width:680px;margin:0 auto}
.menu-cat{margin-bottom:34px}
.menu-cat h3{
  font-family:var(--font-head);
  font-size:1.35rem;color:var(--primary);
  border-bottom:2px solid var(--accent);
  padding-bottom:8px;margin-bottom:14px;
}
.menu-item{
  display:flex;align-items:baseline;gap:8px;
  padding:9px 0;font-size:1rem;
}
.menu-item .dots{
  flex:1;border-bottom:2px dotted color-mix(in srgb, var(--text) 25%, transparent);
  transform:translateY(-4px);
}
.menu-item .price{font-weight:800;color:var(--secondary);white-space:nowrap}
.menu-desc{
  font-size:.82rem;opacity:.62;margin:-4px 0 6px;
  padding-left:2px;font-style:italic;
}
.menu-cal{
  font-size:.78rem;opacity:.55;margin:-2px 0 6px;
  padding-left:2px;font-weight:700;
}
.menu-note{
  text-align:center;font-size:.82rem;opacity:.6;margin-top:8px;
}

/* ---------- Hakkında ---------- */
.about{
  background:var(--secondary);color:#fff;
  max-width:none;
}
.about-inner{max-width:720px;margin:0 auto;text-align:center}
.about .section-title{color:var(--accent)}
.about p{opacity:.92;font-size:1.05rem}

/* ---------- Şubeler ---------- */
.branch{
  background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px;
  display:flex;flex-direction:column;gap:10px;
}
.branch h3{font-family:var(--font-head);color:var(--primary);font-size:1.25rem}
.branch .hours{font-size:.88rem;font-weight:700;color:var(--accent)}
.branch-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.branch-actions a{
  flex:1;min-width:120px;min-height:48px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border-radius:10px;font-weight:700;font-size:.9rem;
  border:1.5px solid var(--primary);color:var(--primary);
}
.branch-actions a:first-child{background:var(--primary);color:#fff}

/* ---------- Footer ---------- */
footer{
  background:var(--secondary);color:#fff;
  text-align:center;padding:36px 20px 90px;
}
footer .brand{color:var(--accent);margin-bottom:8px;display:block}
footer a{border-bottom:1px dotted rgba(255,255,255,.4)}
footer .credit{margin-top:18px;font-size:.8rem;opacity:.55}

/* ---------- Sticky WhatsApp Float ---------- */
.wa-float{
  position:fixed;right:18px;bottom:18px;z-index:100;
  width:58px;height:58px;border-radius:50%;
  background:#25D366;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(37,211,102,.45);
  transition:transform .2s;
}
.wa-float:hover{transform:scale(1.08)}
.wa-float svg{width:30px;height:30px}

/* ---------- Kenar Dekoru (filigran) ---------- */
.decor{
  position:fixed;top:0;bottom:0;width:110px;
  z-index:-1;pointer-events:none;
  background-repeat:repeat-y;background-size:contain;
  display:none;
}
.decor.left{left:0}
.decor.right{right:0;transform:scaleX(-1)}
@media (max-width:480px){ .decor{width:64px} }

/* ---------- Sepet ---------- */
.menu-ctrl{
  display:inline-flex;align-items:center;gap:6px;
  margin-left:10px;flex:none;
}
.menu-add,.menu-sub{
  width:34px;height:34px;flex:none;
  border-radius:50%;border:1.5px solid var(--primary);
  background:#fff;color:var(--primary);
  font-size:1.15rem;font-weight:800;line-height:1;
  cursor:pointer;font-family:var(--font-body);
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.menu-add:active,.menu-sub:active{background:var(--primary);color:#fff}
.menu-qty{
  min-width:20px;text-align:center;
  font-weight:800;color:var(--secondary);font-size:1rem;
}
.menu-ctrl .menu-sub,.menu-ctrl .menu-qty{display:none}
.menu-ctrl.active .menu-sub{display:inline-flex}
.menu-ctrl.active .menu-qty{display:inline-block}
.cart-float{
  position:fixed;right:18px;bottom:88px;z-index:100;
  width:58px;height:58px;border-radius:50%;
  background:var(--primary);color:#fff;border:none;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  transition:transform .2s;font-size:1.5rem;
  padding:0 0 3px 4px;
}
.cart-float:hover{transform:scale(1.08)}
.cart-badge{
  position:absolute;top:-4px;right:-4px;
  min-width:22px;height:22px;border-radius:11px;
  background:var(--accent);color:#fff;
  font-size:.75rem;font-weight:800;font-family:var(--font-body);
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;border:2px solid var(--bg);
}
.cart-panel{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  overflow-y:auto;
  padding:0 20px 40px;
  transform:translateY(100%);
  visibility:hidden;
  transition:transform .35s ease, visibility .35s;
}
.cart-panel.open{
  transform:translateY(0);
  visibility:visible;
}
@keyframes badgePop{
  0%{transform:scale(1)} 50%{transform:scale(1.45)} 100%{transform:scale(1)}
}
.cart-badge.pop{animation:badgePop .3s ease}
.cart-head{
  position:sticky;top:0;background:var(--bg);
  display:flex;align-items:center;gap:12px;
  padding:16px 0 12px;margin-bottom:8px;
  border-bottom:2px solid var(--accent);z-index:5;
}
.cart-head h3{
  font-family:var(--font-head);color:var(--primary);
  font-size:1.4rem;
}
.cart-back{
  width:42px;height:42px;flex:none;
  border-radius:50%;border:1.5px solid var(--primary);
  background:#fff;color:var(--primary);
  font-size:1.3rem;font-weight:800;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-body);line-height:1;
  padding:0 0 4px;
}
.cart-panel.dragging{transition:none}
.cart-list{max-width:600px;margin:0 auto}
.cart-item{
  display:flex;align-items:center;gap:10px;
  padding:13px 0;border-bottom:1px solid color-mix(in srgb, var(--text) 12%, transparent);
  font-size:.98rem;
}
.cart-item .ci-name{flex:1;font-weight:700;min-width:0}
.cart-item .ci-price{
  font-weight:800;color:var(--secondary);
  white-space:nowrap;font-size:.9rem;
}
.cart-qty{
  display:flex;align-items:center;gap:6px;flex:none;
}
.cart-qty button{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--primary);
  background:#fff;color:var(--primary);font-weight:800;font-size:1rem;
  cursor:pointer;font-family:var(--font-body);
}
.cart-qty span{min-width:22px;text-align:center;font-weight:800}
.cart-empty{opacity:.6;font-size:.95rem;text-align:center;padding:30px 0}
.cart-total{
  max-width:600px;margin:14px auto 0;
  text-align:right;font-weight:800;font-size:1.15rem;
  color:var(--secondary);
  border-top:2px solid var(--accent);padding-top:12px;
  display:none;
}
.cart-form{max-width:600px;margin:26px auto 0}

/* ---------- Fiyat güncelleme tarihi ---------- */
.price-updated{
  text-align:center;font-size:.85rem;font-weight:700;
  color:var(--secondary);
  background:color-mix(in srgb, var(--accent) 14%, #fff);
  border:1.5px solid var(--accent);border-radius:999px;
  padding:8px 18px;display:none;width:fit-content;
  margin:0 auto 28px;
}

/* ---------- Duyuru & tatil bandı ---------- */
.top-bar{
  background:var(--primary);color:#fff;
  text-align:center;font-weight:700;font-size:.88rem;
  padding:9px 16px;line-height:1.45;display:none;
}
.top-bar.vac{background:var(--accent)}

/* ---------- Sipariş koşulları kutusu ---------- */
.form-rules-box{
  border:2px solid var(--primary);border-radius:12px;
  background:#fff;padding:14px 18px;margin-bottom:16px;
}
.form-rules-box h4{
  font-family:var(--font-head);color:var(--primary);
  font-size:1.05rem;margin-bottom:8px;
}
.form-rules-box ul{
  margin:0;padding-left:18px;
  font-size:.9rem;line-height:1.7;
}

/* ---------- SSS ---------- */
.faq-wrap{max-width:680px;margin:0 auto}
.faq-item{
  background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;
}
.faq-item summary{
  list-style:none;cursor:pointer;
  padding:16px 18px;min-height:48px;
  font-weight:800;color:var(--primary);font-size:.98rem;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.faq-item summary::-webkit-details-marker{display:none}
.faq-item summary::after{
  content:'+';font-size:1.35rem;color:var(--accent);
  font-weight:800;flex:none;
}
.faq-item[open] summary::after{content:'−'}
.faq-item p{padding:0 18px 16px;font-size:.93rem;opacity:.8}

/* ---------- Logo açılış efekti ---------- */
.intro-overlay{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s ease .35s;
}
.intro-overlay.done{opacity:0;pointer-events:none}
.intro-overlay .intro-box{text-align:center}
.intro-overlay img{
  width:116px;height:116px;border-radius:50%;
  object-fit:cover;border:3px solid var(--accent);
  margin:0 auto;
  transition:transform .8s cubic-bezier(.22,.61,.36,1);
  animation:introPop .5s ease;
}
.intro-overlay .intro-hi{
  font-family:var(--font-head);color:var(--primary);
  font-size:1.3rem;font-weight:700;margin-top:14px;
  transition:opacity .3s;
}
@keyframes introPop{
  from{transform:scale(.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* ---------- Form üstü fotoğraf notu kutusu ---------- */
.form-note-box{
  border:2.5px solid var(--accent);border-radius:12px;
  background:color-mix(in srgb, var(--accent) 12%, #fff);
  padding:14px 16px;margin-bottom:22px;
  font-weight:800;font-size:.95rem;color:var(--secondary);
  text-align:center;line-height:1.5;
}

/* ---------- Tahmini fiyat kutusu ---------- */
.price-estimate{
  border:2px solid var(--accent);border-radius:12px;
  background:color-mix(in srgb, var(--accent) 10%, #fff);
  padding:14px 16px;margin-bottom:18px;text-align:center;
  font-size:1rem;color:var(--secondary);font-weight:700;
}
.price-estimate b{
  font-size:1.3rem;color:var(--primary);
  font-family:var(--font-head);margin-left:6px;
}
.price-estimate .pe-note{
  display:block;font-size:.8rem;opacity:.72;
  margin-top:5px;font-weight:700;
}

/* ---------- Sipariş Formu ---------- */
.order-form{max-width:600px;margin:0 auto}
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-weight:700;color:var(--primary);
  font-size:.95rem;margin-bottom:6px;
  font-family:var(--font-head);
}
.form-group input,
.form-group select,
.form-group textarea{
  width:100%;padding:12px 14px;border:1.5px solid #ddd;
  border-radius:10px;font-family:var(--font-body);
  font-size:1rem;background:#fff;color:var(--text);
  transition:border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  outline:none;border-color:var(--primary);
}
.form-group textarea{resize:vertical;min-height:80px}
.checkbox-grid{
  display:flex;flex-wrap:wrap;gap:10px;
}
.checkbox-grid label{
  display:flex;align-items:center;gap:6px;
  font-weight:400;font-size:.95rem;cursor:pointer;
  font-family:var(--font-body);
  background:#fff;border:1.5px solid #ddd;
  padding:8px 14px;border-radius:8px;
  transition:border-color .2s, background .2s;
}
.checkbox-grid label:has(input:checked){
  border-color:var(--primary);
  background:color-mix(in srgb, var(--primary) 8%, #fff);
}
.checkbox-grid input[type="checkbox"]{
  width:18px;height:18px;accent-color:var(--primary);
}
.btn-order{
  width:100%;min-height:52px;border:none;cursor:pointer;
  background:var(--primary);color:#fff;
  font-family:var(--font-body);font-weight:800;font-size:1.05rem;
  border-radius:999px;display:flex;align-items:center;
  justify-content:center;gap:8px;
  box-shadow:var(--shadow);transition:transform .2s;
}
.btn-order:active{transform:scale(.97)}
.form-notes{
  margin-top:20px;font-size:.85rem;opacity:.7;
  line-height:1.6;
}

/* ---------- Scroll animasyonu ---------- */
.reveal{
  opacity:0;transform:translateY(24px);
  transition:opacity .6s ease, transform .6s ease;
}
.reveal.visible{opacity:1;transform:translateY(0)}

@media (prefers-reduced-motion: reduce){
  .reveal{opacity:1;transform:none;transition:none}
  .cart-panel{transition:none}
  .cart-badge.pop{animation:none}
  .intro-overlay{display:none}
  html{scroll-behavior:auto}
}

/* ---------- Breakpoints (sadece 2 tane, mobile-first) ---------- */
@media (min-width:640px){
  section{padding:72px 32px}
}
@media (max-width:480px){
        const noteHtml = C.orderForm.priceNote
        ? `<span class="pe-note">${C.orderForm.priceNote}</span>` : '';
      el.innerHTML = t === null
        ? `Tahmini Fiyat:<b>Şef belirleyecektir</b>${noteHtml}`
        : `Tahmini Fiyat:<b>${t.toLocaleString('tr-TR')} TL</b>${noteHtml}`;
    }
    if (pricingOn) {
      document.getElementById('ofPortion').addEventListener('change', updateEstimate);
      document.getElementById('ofFlavors').addEventListener('change', updateEstimate);
      updateEstimate();
    }

    if (hasWedding) {
      document.getElementById('ofType').addEventListener('change', function() {
        document.getElementById('ofPortion').innerHTML =
          this.value === 'dugun'
            ? mkPortions(C.orderForm.weddingPortions)
            : mkPortions(C.orderForm.portions);
        if (pricingOn) updateEstimate();
      });
    }

    const notesEl = document.getElementById('ofNotes');
    if (C.orderForm.notes) {
      notesEl.innerHTML = C.orderForm.notes.join('<br>');
    }

    document.getElementById('ofSubmit').addEventListener('click', function() {
      const name = document.getElementById('ofName').value.trim();
      const phone = document.getElementById('ofPhone').value.trim();
      const date = document.getElementById('ofDate').value;
      const portion = document.getElementById('ofPortion').value;
      const cream = document.getElementById('ofCream').value;
      const branch = document.getElementById('ofBranch').value;
      const msg = document.getElementById('ofMsg').value.trim();

      const flavors = [...document.querySelectorAll('#ofFlavors input:checked')]
        .map(cb => cb.value);

      if (C.vacationLock && C.vacationNote) { alert(C.vacationNote); return; }
      if (!name) { alert('Lütfen adınızı girin.'); return; }
      if (!date) { alert('Lütfen teslim tarihini seçin.'); return; }
      const dEl = document.getElementById('ofDate');
      if (dEl.min && date < dEl.min) {
        alert('Siparişler en az ' + C.orderForm.minDaysAhead + ' gün önceden alınmaktadır. Lütfen daha ileri bir tarih seçin.');
        return;
      }

      const isWedding = hasWedding && document.getElementById('ofType').value === 'dugun';
      let text = isWedding ? `*DÜĞÜN PASTASI SİPARİŞİ*\n\n` : `*ÖZEL PASTA SİPARİŞİ*\n\n`;
      text += `*Ad Soyad:* ${name}\n`;
      if (phone) text += `*Telefon:* ${phone}\n`;
      text += `*Teslim Tarihi:* ${date}\n`;
      text += `*Porsiyon:* ${portion} Kişilik\n`;
      if (flavors.length) text += `*İçerik:* ${flavors.join(', ')}\n`;
      text += `*Kek & Krema:* ${cream}\n`;
      text += `*Şube:* ${branch}\n`;
      if (pricingOn) {
        const est = calcEstimate();
        if (est !== null) {
          text += `*Tahmini Fiyat:* ${est.toLocaleString('tr-TR')} TL`;
          if (C.orderForm.priceNote) text += ` (${C.orderForm.priceNote})`;
          text += `\n`;
        }
      }
      if (msg) text += `*Not:* ${msg}\n`;
      text += `\nAklınızdaki pastanın örnek fotoğrafı varsa bu mesajın ardından gönderebilirsiniz.`;

      window.open(`https://wa.me/${C.whatsapp}?text=${encodeURIComponent(text)}`, '_blank');
    });
  }

  if (Array.isArray(C.faq) && C.faq.length) {
    document.getElementById('sss').style.display = '';
    document.getElementById('faqWrap').innerHTML = C.faq.map(f =>
      `<details class="faq-item"><summary>${f.q}</summary><p>${f.a}</p></details>`
    ).join('');
  }

  const mda = (C.orderForm && C.orderForm.minDaysAhead) || 0;
  if (mda > 0) {
    const d = new Date();
    d.setDate(d.getDate() + mda);
    const min = d.toISOString().slice(0, 10);
    ['ofDate', 'cfDate'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.min = min;
    });
  }

  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (C.intro && C.logo && !reducedMotion) {
    let shown = false;
    try { shown = sessionStorage.getItem('introShown') === '1'; } catch(e) {}
    if (!shown) {
      try { sessionStorage.setItem('introShown', '1'); } catch(e) {}
      const ov = document.createElement('div');
      ov.className = 'intro-overlay';
      ov.innerHTML = `<div class="intro-box"><img src="${C.logo}" alt=""><p class="intro-hi">Hoş Geldiniz</p></div>`;
      document.body.appendChild(ov);
      const img = ov.querySelector('img');
      setTimeout(() => {
        const target = document.getElementById('brandLogo');
        if (target && target.style.display !== 'none') {
          const tr = target.getBoundingClientRect();
          const ir = img.getBoundingClientRect();
          const dx = (tr.left + tr.width/2) - (ir.left + ir.width/2);
          const dy = (tr.top + tr.height/2) - (ir.top + ir.height/2);
          img.style.transform = `translate(${dx}px, ${dy}px) scale(${tr.width / ir.width})`;
        }
        ov.querySelector('.intro-hi').style.opacity = '0';
        ov.classList.add('done');
        setTimeout(() => ov.remove(), 950);
      }, 1000);
    }
  }

  if (C.particles && !reducedMotion) {
    const SETS = {
      kar:      ['❄️','❅','❆'],
      yaprak:   ['🌿','🍃','☘️'],
      meyve:    ['🍓','🍒','🥝','🍑','🍇'],
      sonbahar: ['🍂','🍁']
    };
    const autoSet = () => {
      const m = new Date().getMonth() + 1;
      if (m === 12 || m <= 2) return SETS.kar;
      if (m <= 5) return SETS.yaprak;
      if (m <= 9) return SETS.meyve;
      return SETS.sonbahar;
    };
    const set = C.particles === 'auto' ? autoSet() : (SETS[C.particles] || autoSet());
    let live = 0;
    document.addEventListener('pointerdown', e => {
      const n = 4 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n && live < 20; i++) {
        live++;
        const s = document.createElement('span');
        s.textContent = set[Math.floor(Math.random() * set.length)];
        s.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;` +
          `z-index:400;pointer-events:none;font-size:${18 + Math.random()*10}px;` +
          `will-change:transform,opacity`;
        document.body.appendChild(s);
        const dx = (Math.random() - .5) * 130;
        const anim = s.animate([
          { transform: 'translate(-50%,-50%) rotate(0deg) scale(1)', opacity: 1 },
          { transform: `translate(calc(-50% + ${dx}px), ${90 + Math.random()*80}px)` +
            ` rotate(${(Math.random()-.5)*240}deg) scale(.2)`, opacity: 0 }
        ], { duration: 2350 + Math.random()*400, easing: 'cubic-bezier(.25,.46,.45,.94)' });
        anim.onfinish = () => { s.remove(); live--; };
      }
    }, { passive: true });
  }

  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, {threshold:0.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
})();
</script>
</body>
</html>
